<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Page</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #0ea5e9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(640px, 100%);
      background: var(--card);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: clamp(1.6rem, 2.4vw, 2.2rem);
    }

    p {
      margin: 0 0 16px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.3);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Sample HTML Page</h1>
    <p>
      This is a simple starter HTML file with embedded CSS. You can edit this
      section to build your own layout.
    </p>
    <a class="btn" href="#" onclick="alert('Hello from sample.html!')">Click Me</a>
  </main>
</body>
</html>
