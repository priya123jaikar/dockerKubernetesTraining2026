version: '3.9'
services:
  java-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: jatinbhalla1991/java-web:latest
    ports:
      - "8080:8080"
    restart: unless-stopped
  
  java-db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    restart: unless-stopped
  
  java-redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: unless-stopped

    volumes:
      - redis-data:/data



