name: Assignment2 Docker Build and Push

on:
  push:
    branches:
      - main
    paths:
      - assignment1/backend/**
      - .github/workflows/assignment2-dockerhub.yml
  workflow_dispatch:

env:
  IMAGE_NAME: assignment1-backend

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker Hub credentials
        id: creds
        env:
          USERNAME_SECRET: ${{ secrets.DOCKERHUB_USERNAME }}
          USERNAME_VAR: ${{ vars.DOCKERHUB_USERNAME }}
          TOKEN_SECRET: ${{ secrets.DOCKERHUB_TOKEN }}
          PASSWORD_SECRET: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          USERNAME="${USERNAME_SECRET:-$USERNAME_VAR}"
          TOKEN="${TOKEN_SECRET:-$PASSWORD_SECRET}"

          if [ -z "$USERNAME" ]; then
            echo "Missing Docker Hub username. Set DOCKERHUB_USERNAME (Secret or Variable)."
            exit 1
          fi

          if [ -z "$TOKEN" ]; then
            echo "Missing Docker Hub token/password. Set DOCKERHUB_TOKEN (preferred) or DOCKERHUB_PASSWORD secret."
            exit 1
          fi

          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.creds.outputs.username }}
          password: ${{ steps.creds.outputs.token }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.creds.outputs.username }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./assignment1/backend
          file: ./assignment1/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
